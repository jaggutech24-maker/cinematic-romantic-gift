ngs with you",text:"Sunday mornings are my favorite kind of magic. Half-awake, sunlight threading through the curtains, your hand finding mine without either of us trying. I love who I am when I'm lying beside you.",date:"every sunday",icon:"🌤️"},initialRotation:-3,initialX:35,initialY:62,width:155},{id:4,src:"/photos/img4.jpeg",label:"our little garden",note:{title:"You bloom everything around you",text:"You have this quiet magic — wherever you are, things become more beautiful. More alive. More full of color. I didn't believe in garden picnics until I had one with you. Now I want a thousand more.",date:"spring, every year",icon:"🌹"},initialRotation:11,initialX:55,initialY:55,width:165},{id:5,src:"/photos/img5.jpeg",label:"dancing under stars",note:{title:"We danced without music",text:"There was no music playing. Just the sound of the night, the soft hum of the world, and you pulling me close under the string lights. I didn't need a song. You were the song.",date:"a night I'll never forget",icon:"✨"},initialRotation:-12,initialX:75,initialY:32,width:158},{id:6,src:"/photos/img6.jpeg",label:"her laughter",note:{title:"Your laugh is my favorite sound",text:"If I could bottle one thing and keep it forever, it would be the sound of your laughter. Unguarded, full, completely real. In those moments, I'm certain there's nothing more beautiful in this world.",date:"every single day",icon:"💛"},initialRotation:7,initialX:20,initialY:38,width:162},{id:7,src:"/photos/img7.jpeg",label:"our cozy world",note:{title:"Home is wherever you are",text:"I've realized that home isn't a place at all. It's the warmth of fairy lights reflecting in your eyes. It's candles and soft music and you reading beside me. You are every home I've ever wanted.",date:"always and always",icon:"🕯️"},initialRotation:-6,initialX:8,initialY:60,width:155},{id:8,src:"/photos/img8.jpeg",label:"our sunset",note:{title:"Watching the sky with you",text:"We sat there until the colors faded and the stars took over, neither of us wanting to move. I remember thinking: I don't need to travel the world. The whole world is in the person sitting next to me.",date:"the best evening",icon:"🌅"},initialRotation:9,initialX:42,initialY:18,width:168},{id:9,src:"/photos/img1.jpeg",label:"for you, always",note:{title:"Everything reminds me of you",text:"Roses, soft pinks, the delicate things — they all carry your name now. You've changed how I see beauty. You've made the world more gentle. More worthy of being loved. Just like you.",date:"all the time",icon:"🌺"},initialRotation:-4,initialX:62,initialY:72,width:160},{id:10,src:"/photos/img6.jpeg",label:"silly faces",note:{title:"Being ourselves",text:"I love that we never have to pretend around each other. The silly faces, the random bursts of energy, it's all just us.",date:"the best times",icon:"🤪"},initialRotation:3,initialX:42,initialY:40,width:158},{id:11,src:"/photos/img7.jpeg",label:"mirror selfies",note:{title:"Picture perfect",text:"Just a quick snap to capture how happy I am with you. Every picture we take is a new favorite.",date:"any day",icon:"📷"},initialRotation:-5,initialX:85,initialY:60,width:165},{id:12,src:"/photos/img8.jpeg",label:"together",note:{title:"You and me",text:"There is nowhere else I'd rather be than right here, making you smile and making memories.",date:"our time",icon:"💕"},initialRotation:6,initialX:25,initialY:80,width:155},{id:13,src:"/photos/img2.jpeg",label:"Future memories loading…",note:{title:"Our story isn't finished",text:"This one is still being written. By us. Together. All the places we haven't been yet, the mornings we haven't woken up to, the laughter we haven't discovered yet. I can't wait for all of it — with you.",date:"someday soon",icon:"🔮"},initialRotation:0,initialX:80,initialY:15,width:158,locked:!0}];function dm({photo:E,onClose:G}){const N=E!==null,d=ll.useRef(null);ll.useEffect(()=>{E&&(d.current=E)},[E]);const U=E||d.current;return ll.useEffect(()=>{const O=Y=>{Y.key==="Escape"&&G(
